<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Material Calc">
<meta name="theme-color" content="#1b1b1a">
<title>Material Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1b1b1a; --paper:#f5f3ee; --card:#ffffff; --line:rgba(27,27,26,.12);
  --line2:rgba(27,27,26,.22); --muted:#6c6a63; --accent:#c9521f; --accent-soft:#fbeee7;
  --warn:#b5740d; --ok:#2f7a52; --r:12px; --r-sm:9px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:16px;line-height:1.5}
body{max-width:540px;margin:0 auto;padding:18px 16px 56px}
h1{font-family:'Space Grotesk','Inter',sans-serif;font-size:21px;font-weight:700;letter-spacing:-.01em}
.eyebrow{font-family:'Space Grotesk',sans-serif;font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:4px}
.hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.status{font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;margin-top:4px}
.dot{width:8px;height:8px;border-radius:50%;background:#bbb}
.status.on .dot{background:var(--ok)}
.status.on{color:var(--ok)}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px;font-weight:500}
input,button{font-family:inherit;font-size:16px;color:var(--ink)}
input[type=text],input[type=number]{width:100%;height:42px;padding:0 12px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);outline:none;transition:border-color .12s,box-shadow .12s}
input[type=number]{font-variant-numeric:tabular-nums}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
#job{height:46px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px}
.datetime{font-size:12.5px;color:var(--muted);font-weight:500;margin:8px 2px 0;font-variant-numeric:tabular-nums}
.panelHdr input[type=text]{font-weight:600}
.settings{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:18px}
.row{display:flex;gap:10px}
.row>div{flex:1;min-width:0}
.mwbtns{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.chip{flex:none;height:42px;padding:0 15px;background:var(--card);border:1px solid var(--line2);border-radius:var(--r-sm);font-weight:600;cursor:pointer;transition:.12s}
.chip:active{transform:scale(.97)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
#media{flex:1;min-width:90px}
.section-label{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:0 2px 10px}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:13px;margin-bottom:11px}
.panelHdr{display:flex;gap:8px;align-items:center;margin-bottom:11px}
.unit{display:flex;border:1px solid var(--line2);border-radius:var(--r-sm);overflow:hidden;flex:none}
.unit button{height:38px;padding:0 13px;background:transparent;border:0;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
.unit button+button{border-left:1px solid var(--line2)}
.unit button.on{background:var(--accent-soft);color:var(--accent)}
.del{width:42px;height:42px;flex:none;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--line);border-radius:var(--r-sm);cursor:pointer;color:var(--muted);font-size:18px}
.del:active{background:#f0ede7}
.sub{font-size:13px;color:var(--muted);margin-top:11px;line-height:1.6;font-variant-numeric:tabular-nums}
.sub b{color:var(--ink);font-weight:600}
.tag{color:var(--warn)}
.add{width:100%;height:46px;background:transparent;border:1.5px dashed var(--line2);border-radius:var(--r);font-weight:600;color:var(--ink);cursor:pointer;margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:7px}
.add:active{background:#f0ede7}
.summary{background:var(--ink);color:#fff;border-radius:var(--r);padding:18px}
.summary .line{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;font-size:14px}
.summary .line .k{color:rgba(255,255,255,.62)}
.summary .line .v{font-weight:600;font-variant-numeric:tabular-nums}
.subnote{font-size:12px;color:rgba(255,255,255,.5);margin:-2px 0 4px;font-variant-numeric:tabular-nums}
.grand{display:flex;justify-content:space-between;align-items:center;padding-top:14px;margin-top:8px;border-top:1px solid rgba(255,255,255,.16)}
.grand .k{font-size:15px;font-weight:600}
.grand .v{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;font-variant-numeric:tabular-nums}
.foot{display:flex;gap:8px;margin-top:14px}
.foot button{flex:1;height:44px;border-radius:var(--r-sm);font-weight:600;cursor:pointer}
.btn-save{background:var(--accent);color:#fff;border:1px solid var(--accent)}
.btn-ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.foot button:active{transform:scale(.98)}
.saved{margin-top:26px}
.job-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 12px;margin-bottom:9px}
.job-card .info{flex:1;min-width:0}
.job-card .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.job-card .meta{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
.job-card button{height:34px;padding:0 12px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;flex:none}
.job-load{background:var(--ink);color:#fff;border:0}
.job-del{background:transparent;border:1px solid var(--line);color:var(--muted)}
.empty{font-size:13px;color:var(--muted);padding:6px 2px}
.hint{font-size:12px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.6}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:99px;font-size:14px;font-weight:500;opacity:0;transition:.2s;pointer-events:none;z-index:50}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="eyebrow">Print &amp; wrap quote</div>
    <h1>Material calculator</h1>
  </div>
  <div class="status" id="status"><span class="dot"></span><span id="status-txt">Connecting</span></div>
</div>

<input id="job" type="text" value="" placeholder="Job name" aria-label="Job name">
<div class="datetime" id="datetime"></div>

<div class="settings" style="margin-top:14px">
  <label>Media width (in)</label>
  <div class="mwbtns">
    <button class="chip mw" data-v="24">24"</button>
    <button class="chip mw" data-v="54">54"</button>
    <button class="chip mw" data-v="60">60"</button>
    <input id="media" type="number" value="54" min="1" step="0.5" inputmode="decimal" aria-label="Media width inches">
  </div>
</div>

<div class="section-label">Panels</div>
<div id="panels"></div>

<button class="add" id="add">+ Add panel</button>

<div class="summary">
  <div class="line"><span class="k">Media to run</span><span class="v" id="t-lin">0 lin ft</span></div>
  <div class="line"><span class="k">Final sq ft (billed)</span><span class="v" id="t-marea">0 sq ft</span></div>
  <div class="subnote" id="marea-note"></div>
  <div class="line"><span class="k">Subtotal</span><span class="v" id="t-sub">$0.00</span></div>
  <div class="line"><span class="k">Tax (13%)</span><span class="v" id="t-tax">$0.00</span></div>
  <div class="grand"><span class="k">Grand total</span><span class="v" id="t-cost">$0.00</span></div>
</div>

<div class="foot">
  <button class="btn-save" id="saveBtn">Save job</button>
  <button class="btn-ghost" id="copyBtn">Copy</button>
  <button class="btn-ghost" id="newBtn">New</button>
</div>

<div class="saved">
  <div class="section-label">Saved jobs</div>
  <div id="jobs"></div>
</div>

<div class="hint" id="hint">Syncs to the cloud &mdash; open this same link on any device to see your jobs. On iPhone tap Share &rarr; Add to Home Screen.</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/firebase@9.22.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.22.0/firebase-database-compat.js"></script>
<script>
(function(){
  var TAX=13;
  var FB={apiKey:"AIzaSyBYSYnL4wq7sIDy2rsPQvm94Zbr0S92vyo",authDomain:"business-tracker-f5c7b.firebaseapp.com",databaseURL:"https://business-tracker-f5c7b-default-rtdb.firebaseio.com",projectId:"business-tracker-f5c7b"};
  var db=null, online=false, muteCloud=false, saveTimer=null;
  var panels=document.getElementById('panels');
  var rows=[];
  var SS={get:function(k){try{return localStorage.getItem(k)}catch(e){return null}},
          set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}}};

  function f2(n){return parseFloat(n.toFixed(2))}
  function money(n){return '$'+n.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}
  function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},1700)}
  function fmtDateTime(ms){return new Date(ms).toLocaleString(undefined,{weekday:'short',month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'})}
  function updateDateTime(){var el=document.getElementById('datetime');if(el)el.textContent=fmtDateTime(Date.now())}

  function setUnit(card,u){
    card.dataset.unit=u;
    card.querySelectorAll('.unit button').forEach(function(b){b.classList.toggle('on',b.dataset.u===u)});
  }

  function mkRow(name,w,h,p,unit){
    unit=unit||'in';
    var d=document.createElement('div');
    d.className='panel';
    d.innerHTML=
      '<div class="panelHdr">'+
        '<input class="lbl" type="text" value="'+(name||'')+'" placeholder="Panel name" aria-label="Panel name">'+
        '<div class="unit"><button class="ub" data-u="in">in</button><button class="ub" data-u="ft">ft</button></div>'+
        '<button class="del" aria-label="Remove panel">&#10005;</button>'+
      '</div>'+
      '<div class="row">'+
        '<div><label class="wlbl">Width</label><input class="pw" type="number" min="0" step="0.5" inputmode="decimal" value="'+(w!==undefined?w:'')+'"></div>'+
        '<div><label class="hlbl">Height</label><input class="ph" type="number" min="0" step="0.5" inputmode="decimal" value="'+(h!==undefined?h:'')+'"></div>'+
        '<div><label>$ / sq ft</label><input class="pp" type="number" min="0" step="0.01" inputmode="decimal" value="'+(p!==undefined?p:'')+'"></div>'+
      '</div>'+
      '<div class="sub"></div>';
    panels.appendChild(d);
    d.querySelector('.del').onclick=function(){
      panels.removeChild(d);rows=rows.filter(function(r){return r.el!==d});
      if(rows.length===0)mkRow('','','','','in');
      calc();
    };
    ['.lbl','.pw','.ph','.pp'].forEach(function(s){d.querySelector(s).addEventListener('input',calc)});
    d.querySelectorAll('.ub').forEach(function(b){b.onclick=function(){setUnit(d,b.dataset.u);calc()}});
    setUnit(d,unit);
    rows.push({el:d});
  }

  function gather(){
    return rows.map(function(r){
      return [r.el.querySelector('.lbl').value,
              r.el.querySelector('.pw').value,
              r.el.querySelector('.ph').value,
              r.el.querySelector('.pp').value,
              r.el.dataset.unit];
    });
  }
  function getState(){
    return {job:document.getElementById('job').value,media:document.getElementById('media').value,panels:gather(),ts:Date.now()};
  }
  function applyState(st){
    muteCloud=true;
    rows=[];panels.innerHTML='';
    document.getElementById('job').value=st.job||'';
    if(st.media)document.getElementById('media').value=st.media;
    var ps=st.panels||[];
    if(ps.length)ps.forEach(function(r){mkRow(r[0],r[1],r[2],r[3],r[4]||'in')});
    else mkRow('','','','','in');
    syncMw();calc();
    muteCloud=false;
  }

  function saveLocal(){
    var st=getState();
    SS.set('wrap_state',JSON.stringify(st));
    SS.set('wrap_ts',String(st.ts));
  }
  function scheduleCloud(){
    if(muteCloud||!db||!online)return;
    clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      try{db.ref('wrapcalc/draft').set(getState());}catch(e){}
    },600);
  }

  function calc(){
    var M=parseFloat(document.getElementById('media').value)||0;
    var mwFt=M/12;
    var sumFinal=0,sumCost=0,sumLenIn=0;

    rows.forEach(function(r){
      var u=r.el.dataset.unit, k=(u==='ft')?12:1;
      var wv=parseFloat(r.el.querySelector('.pw').value)||0;
      var hv=parseFloat(r.el.querySelector('.ph').value)||0;
      var p=parseFloat(r.el.querySelector('.pp').value)||0;
      r.el.querySelector('.wlbl').textContent='Width ('+u+')';
      r.el.querySelector('.hlbl').textContent='Height ('+u+')';
      var wIn=wv*k, hIn=hv*k, wFt=wIn/12, hFt=hIn/12;
      var line='';
      if(wIn>0&&hIn>0&&M>0){
        var across=Math.min(wIn,hIn), run=Math.max(wIn,hIn);
        var passes=Math.ceil(across/M);
        var plinFt=(passes*run)/12;
        var finalSqf=plinFt*mwFt;
        var cost=finalSqf*p;
        sumLenIn+=passes*run; sumFinal+=finalSqf; sumCost+=cost;
        line='<b>'+f2(wFt)+' &times; '+f2(hFt)+' ft</b> &middot; '+passes+' pass'+(passes!==1?'es':'')+
             ' &middot; '+plinFt.toFixed(1)+' lin ft &middot; '+
             (across<=M?'1 piece':'<span class="tag">'+passes+'-piece seam</span>')+
             '<br>Final <b>'+plinFt.toFixed(1)+' &times; '+f2(mwFt)+' = '+finalSqf.toFixed(2)+' sq ft</b> &times; $'+(p||0).toFixed(2)+
             ' = <b>'+money(cost)+'</b>';
      } else if(wIn>0&&hIn>0){
        line='<b>'+f2(wFt)+' &times; '+f2(hFt)+' ft</b> &middot; set media width';
      }
      r.el.querySelector('.sub').innerHTML=line;
    });

    var lin=sumLenIn/12;
    document.getElementById('t-lin').textContent=lin.toFixed(1)+' lin ft  ('+(lin/3).toFixed(1)+' yd)';
    document.getElementById('t-marea').textContent=sumFinal.toFixed(2)+' sq ft';
    document.getElementById('marea-note').textContent=lin>0?(lin.toFixed(1)+' ft \u00d7 '+f2(mwFt)+' ft  ('+M+'" media)'):'';

    var taxAmt=sumCost*TAX/100, grand=sumCost+taxAmt;
    document.getElementById('t-sub').textContent=money(sumCost);
    document.getElementById('t-tax').textContent=money(taxAmt);
    document.getElementById('t-cost').textContent=money(grand);

    saveLocal();
    scheduleCloud();
  }

  function syncMw(){
    var v=document.getElementById('media').value;
    document.querySelectorAll('.mw').forEach(function(b){b.classList.toggle('on',b.dataset.v===String(parseFloat(v)))});
  }

  // ---- saved jobs ----
  function renderJobs(obj){
    var box=document.getElementById('jobs');
    box.innerHTML='';
    var keys=obj?Object.keys(obj):[];
    if(!keys.length){box.innerHTML='<div class="empty">No saved jobs yet. Fill a job and tap Save.</div>';return;}
    keys.sort(function(a,b){return (obj[b].savedAt||0)-(obj[a].savedAt||0)});
    keys.forEach(function(id){
      var j=obj[id];
      var d=document.createElement('div');d.className='job-card';
      var dt=j.savedAt?fmtDateTime(j.savedAt):'';
      d.innerHTML='<div class="info"><div class="nm">'+(j.name||'Untitled')+'</div>'+
        '<div class="meta">'+(j.total||'')+(dt?(' \u00b7 '+dt):'')+'</div></div>'+
        '<button class="job-load">Open</button><button class="job-del" aria-label="Delete">\u2715</button>';
      d.querySelector('.job-load').onclick=function(){applyState({job:j.name,media:j.media,panels:j.panels});toast('Loaded "'+(j.name||'job')+'"');window.scrollTo(0,0)};
      d.querySelector('.job-del').onclick=function(){
        if(!confirm('Delete "'+(j.name||'job')+'"?'))return;
        if(db&&online)db.ref('wrapcalc/jobs/'+id).remove();
      };
      box.appendChild(d);
    });
  }

  function saveJob(){
    var name=document.getElementById('job').value.trim();
    if(!name){name=prompt('Name this job:','');if(!name)return;document.getElementById('job').value=name;}
    if(!db||!online){toast('Offline \u2014 connect to save to cloud');return;}
    var data={name:name,media:document.getElementById('media').value,panels:gather(),total:document.getElementById('t-cost').textContent,savedAt:Date.now()};
    db.ref('wrapcalc/jobs').push(data).then(function(){toast('Saved \u2713')}).catch(function(){toast('Save failed \u2014 check database rules')});
  }

  // ---- firebase ----
  function setStatus(on){
    var s=document.getElementById('status');
    s.classList.toggle('on',on);
    document.getElementById('status-txt').textContent=on?'Synced':'Offline';
  }
  function initFB(){
    if(typeof firebase==='undefined'){setStatus(false);document.getElementById('hint').textContent='Cloud library blocked \u2014 working on this device only.';return;}
    try{
      if(!firebase.apps.length)firebase.initializeApp(FB);
      db=firebase.database();
      db.ref('.info/connected').on('value',function(s){online=!!s.val();setStatus(online);if(online)scheduleCloud();});
      db.ref('wrapcalc/draft').once('value').then(function(s){
        if(s.exists()){
          var remote=s.val();
          var localTs=parseInt(SS.get('wrap_ts')||'0',10);
          if((remote.ts||0)>localTs)applyState(remote);
        }
      }).catch(function(){});
      db.ref('wrapcalc/jobs').on('value',function(s){renderJobs(s.val());});
    }catch(e){setStatus(false);}
  }

  // ---- startup (local first for instant UI) ----
  function startLocal(){
    var saved=SS.get('wrap_state');
    if(saved){try{var st=JSON.parse(saved);if(st&&st.panels){applyState(st);return;}}catch(e){}}
    var j=SS.get('wrap_job'); if(j!==null)document.getElementById('job').value=j;
    var m=SS.get('wrap_media'); if(m!==null)document.getElementById('media').value=m;
    mkRow('','','','','in');
  }

  document.getElementById('add').onclick=function(){mkRow('','','','','in');calc()};
  document.getElementById('media').addEventListener('input',function(){syncMw();calc()});
  document.getElementById('job').addEventListener('input',function(){saveLocal();scheduleCloud()});
  document.querySelectorAll('.mw').forEach(function(b){
    b.onclick=function(){document.getElementById('media').value=b.dataset.v;syncMw();calc()};
  });
  document.getElementById('saveBtn').onclick=saveJob;
  document.getElementById('newBtn').onclick=function(){
    if(!confirm('Start a new blank job? (Saved jobs are kept)'))return;
    applyState({job:'',media:document.getElementById('media').value,panels:[]});
    window.scrollTo(0,0);
  };
  document.getElementById('copyBtn').onclick=function(){
    var lines=[(document.getElementById('job').value||'Quote'),fmtDateTime(Date.now()),''];
    rows.forEach(function(r){
      var n=r.el.querySelector('.lbl').value||'Panel';
      var s=r.el.querySelector('.sub').textContent.replace(/\s+/g,' ').trim();
      if(s)lines.push(n+' \u2014 '+s);
    });
    lines.push('');
    lines.push('Media to run: '+document.getElementById('t-lin').textContent);
    lines.push('Final sq ft: '+document.getElementById('t-marea').textContent);
    lines.push('Subtotal: '+document.getElementById('t-sub').textContent);
    lines.push('Tax (13%): '+document.getElementById('t-tax').textContent);
    lines.push('GRAND TOTAL: '+document.getElementById('t-cost').textContent);
    var txt=lines.join('\n');
    var done=function(){toast('Copied \u2713')};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done,function(){alert(txt)})}
    else{alert(txt)}
  };

  startLocal();
  syncMw();
  calc();
  updateDateTime();
  setInterval(updateDateTime,30000);
  initFB();
})();
</script>
</body>
</html>
